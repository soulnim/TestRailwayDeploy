spring.application.name=expensetracker

# Database configuration
# Railway provides PG* variables; Spring's own SPRING_DATASOURCE_* env vars still override these.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:expensetracker}
spring.datasource.username=${PGUSER:${POSTGRES_USER:}}
spring.datasource.password=${PGPASSWORD:${POSTGRES_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Railway dynamic port
server.port=${PORT:8080}
