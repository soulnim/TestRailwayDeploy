spring.application.name=expensetracker

# PostgreSQL Connection
# Priority:
# 1) SPRING_DATASOURCE_* (explicit Spring Boot variables)
# 2) Railway Postgres variables (PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD)
# 3) Local defaults
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:expensetracker}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:app}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:app}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# Railway provides PORT dynamically
server.port=${PORT:8080}
